---
- name: "Find superset container name"
  community.docker.docker_container_exec:
    container: "{{ node_prefix }}-0"
    command: |
      {% raw %}
      /bin/bash -c
      'echo $(docker ps --filter "name=superset" --format "{{.Names}}")'
      {% endraw %}
  register: "superset_container_name"

- name: "Run pre-disaster functional tests"
  block:
    - name: "Run functional tests on superset"
      community.docker.docker_container_exec:
        container: "{{ node_prefix }}-0"
        command: "python3 -c
          'import functional_superset;
          superset_functional = functional_superset.Superset(
            superset_container=\"{{ superset_container_name.stdout.strip() }}\",
            virtual_ip_address=\"{{ virtual_ip_address }}\"
          );
          query_dttm = superset_functional.run_query();
          superset_functional.get_query_results(query_dttm)'
          "
        chdir: "/opt/superset-testing"
      register: "functional_superset"

    - name: "Run functional tests on mgmt"
      community.docker.docker_container_exec:
        container: "{{ node_prefix }}-0"
        command: "python3 -c
          'import functional_mgmt;
          mgmt_functional = functional_mgmt.Mgmt(
            virtual_ip_address=\"{{ virtual_ip_address }}\",
            node_prefix=\"{{ node_prefix }}\",
            after_disaster=False
          );'
          "
        chdir: "/opt/superset-testing"
      register: "functional_mgmt"

  always:
    - name: "Superset functional test results (pre-disaster)"
      ansible.builtin.debug:
        msg: >-
          rc={{ functional_superset.rc }}
          stdout={{ functional_superset.stdout }}
          stderr={{ functional_superset.stderr }}
      when: "functional_superset is defined"

    - name: "Management functional test results (pre-disaster)"
      ansible.builtin.debug:
        msg: >-
          rc={{ functional_mgmt.rc }}
          stdout={{ functional_mgmt.stdout }}
          stderr={{ functional_mgmt.stderr }}
      when: "functional_mgmt is defined"

- name: "Stop mgmt primary node"
  community.docker.docker_container:
    name: "{{ node_prefix }}-0"
    state: "stopped"

- name: "Stop mysql primary node"
  community.docker.docker_container:
    name: "{{ node_prefix }}-2"
    state: "stopped"

- name: "Collect container health after disaster"
  community.docker.docker_container_exec:
    container: "{{ item }}"
    command: >-
      /bin/bash -c
      'docker ps -a
      --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"'
  loop:
    - "{{ node_prefix }}-1"
    - "{{ node_prefix }}-3"
    - "{{ node_prefix }}-4"
  register: "post_disaster_health"
  changed_when: false
  failed_when: false

- name: "Container health status after disaster"
  ansible.builtin.debug:
    msg: "{{ item.item }}:\n{{ item.stdout }}"
  loop: "{{ post_disaster_health.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: "Find superset container name"
  community.docker.docker_container_exec:
    container: "{{ node_prefix }}-1"
    command: |
      {% raw %}
      /bin/bash -c
      'echo $(docker ps --filter "name=superset" --format "{{.Names}}")'
      {% endraw %}
  register: "superset_container_name"

- name: "Run post-disaster functional tests"
  block:
    - name: "Run functional tests on mgmt after disaster"
      community.docker.docker_container_exec:
        container: "{{ node_prefix }}-1"
        command: "python3 -c
          'import functional_mgmt;
          mgmt_functional = functional_mgmt.Mgmt(
            virtual_ip_address=\"{{ virtual_ip_address }}\",
            node_prefix=\"{{ node_prefix }}\",
            after_disaster=True
          );
          mgmt_functional.check_after_disaster()'
          "
        chdir: "/opt/superset-testing"
      register: "functional_mgmt_disaster"
      retries: 6
      delay: 10

    - name: "Run functional tests on superset after disaster"
      community.docker.docker_container_exec:
        container: "{{ node_prefix }}-1"
        command: "python3 -c
          'import functional_superset;
          superset_functional = functional_superset.Superset(
            superset_container=\"{{ superset_container_name.stdout.strip() }}\",
            virtual_ip_address=\"{{ virtual_ip_address }}\"
          );
          query_dttm = superset_functional.run_query();
          superset_functional.get_query_results(query_dttm)'
          "
        chdir: "/opt/superset-testing"
      register: "functional_superset_disaster"

  always:
    - name: "Management functional test results (post-disaster)"
      ansible.builtin.debug:
        msg: >-
          rc={{ functional_mgmt_disaster.rc }}
          stdout={{ functional_mgmt_disaster.stdout }}
          stderr={{ functional_mgmt_disaster.stderr }}
      when: "functional_mgmt_disaster is defined"

    - name: "Superset functional test results (post-disaster)"
      ansible.builtin.debug:
        msg: >-
          rc={{ functional_superset_disaster.rc }}
          stdout={{ functional_superset_disaster.stdout }}
          stderr={{ functional_superset_disaster.stderr }}
      when: "functional_superset_disaster is defined"
