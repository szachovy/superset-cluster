---
- name: "Remove stopped node containers"
  community.docker.docker_container:
    name: "{{ item }}"
    state: "absent"
  loop:
    - "{{ node_prefix }}-0"
    - "{{ node_prefix }}-2"

- name: "Rerun terraform to recreate removed nodes"
  ansible.builtin.shell: |
    set -euxo pipefail
    terraform apply -auto-approve
  args:
    executable: "/bin/bash"
    chdir: "../setup"
  async: 600
  poll: 30
  register: "terraform_apply"
  changed_when: "terraform_apply.rc != 0"

- name: "Verify SSH connectivity to recreated nodes"
  ansible.builtin.command: "ssh -o ConnectTimeout=10 {{ item }} echo ok"
  loop:
    - "{{ node_prefix }}-0"
    - "{{ node_prefix }}-2"
  changed_when: false
  retries: 3
  delay: 5
  until: "ssh_check.rc == 0"
  register: "ssh_check"

- name: "Wait for Docker daemon readiness in recreated nodes"
  community.docker.docker_container_exec:
    container: "{{ item }}"
    command: >-
      /bin/bash -c
      'for i in $(seq 1 30); do
      docker info >/dev/null 2>&1 && exit 0; sleep 2; done; exit 1'
  loop:
    - "{{ node_prefix }}-0"
    - "{{ node_prefix }}-2"
  changed_when: false
